<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Acesso{% endblock %} | App</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">

  {% load static %}
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">

  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
    }
    .auth-card {
      border: none;
      border-radius: 1rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }
    .auth-card .card-header {
      background: transparent;
      border-bottom: 1px solid rgba(0,0,0,.08);
    }
    .btn-auth {
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .form-control-lg:focus {
      box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
    }
    .divider {
      color: #adb5bd;
      font-size: 0.85rem;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #dee2e6;
    }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">

  <div class="w-100" style="max-width: 440px; padding: 0 1rem;">

    <!-- Logo / Nome do sistema -->
    <div class="text-center mb-4">
      <a href="/" class="text-decoration-none">
        <span class="fs-2 fw-bold text-white">App</span>
      </a>
    </div>

    <!-- Flash messages -->
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
        </div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}

    <p class="text-center text-white-50 mt-4 small">
      &copy; {% now "Y" %} App. Todos os direitos reservados.
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmW/jrLOAOFhqCZr0h36HUHhVQ6"
          crossorigin="anonymous"></script>
</body>
</html>
