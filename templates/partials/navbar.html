{% include 'partials/navbar/navbar.html' %}
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'home:index' %}">App</a>

    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#navbarMain"
            aria-controls="navbarMain" aria-expanded="false" aria-label="Abrir menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMain">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'home:index' %}">Home</a>
        </li>
      </ul>
      <!-- Área de autenticação -->
      <div class="d-flex align-items-center ms-lg-3">
        {% if user.is_authenticated %}
          <span class="text-white-50 small me-3">Olá, <strong class="text-white">{{ user.username }}</strong></span>
          <form method="post" action="{% url 'usuarios:logout' %}" class="m-0">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-light btn-sm">Sair</button>
          </form>
        {% else %}
          <a href="{% url 'usuarios:login' %}" class="btn btn-outline-light btn-sm me-2">Entrar</a>
          <a href="{% url 'usuarios:cadastro' %}" class="btn btn-primary btn-sm">Criar conta</a>
        {% endif %}
      </div>    </div>
  </div>
</nav>
